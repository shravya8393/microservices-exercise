spring.application.name=product-service
server.port=8081
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=microservices_db;encrypt=false
spring.datasource.username=sa
spring.datasource.password=Shravya@8393

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=product-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.microservices.productservice.event.CartEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false